name: Update aviation base data

on:
  schedule:
    - cron: '37 9 * * 0'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-aviation-base-data
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          package-manager-cache: false
      - name: Test base data builders
        run: |
          npm ci
          node --test tests/base-data.test.mjs
      - name: Build FAA and OurAirports snapshots
        env:
          BASE_DATA_OUTPUT: dist/base
        run: |
          node scripts/build-ourairports-base.mjs
          node scripts/build-faa-base.mjs
      - name: Build versioned manifest
        env:
          BASE_DATA_OUTPUT: dist/base
          BASE_DATASET_ID: aviation-base-${{ github.run_id }}-${{ github.run_attempt }}
          BASE_DATA_RELEASE_URL: https://github.com/${{ github.repository }}/releases/download/aviation-base-${{ github.run_id }}-${{ github.run_attempt }}/
        run: node scripts/build-base-manifest.mjs
      - name: Validate generated assets
        run: |
          node --check dist/base/aviation-base-manifest.js
          test "$(find dist/base -maxdepth 1 -type f -name '*.json' | wc -l)" -lt 1000
          test "$(find dist/base -maxdepth 1 -type f -name 'airspace-*.json' | wc -l)" -gt 10
          test "$(find dist/base -maxdepth 1 -type f -name 'airport-map-*.json' | wc -l)" -gt 10
      - name: Publish immutable data release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: aviation-base-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          gh release create "$TAG" --title "Aviation base data $TAG" \
            --notes "Immutable FAA and OurAirports base snapshots generated by GitHub Actions." --prerelease
          find dist/base -maxdepth 1 -type f \( -name 'airspace-*.json' -o -name 'airport-map-*.json' \
            -o -name 'faa-airports.json' -o -name 'navaids.json' \
            -o -name 'ourairports-airports.json' -o -name 'ourairports-runways.json' \) -print0 \
            | xargs -0 -n 40 gh release upload "$TAG"
      - name: Publish stable manifest safely
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if ! gh release view aviation-base-data >/dev/null 2>&1; then
            gh release create aviation-base-data --title "Aviation base data manifest" \
              --notes "Stable manifest pointing to the latest immutable aviation base snapshot." --prerelease
          fi
          gh release upload aviation-base-data dist/base/navaids.json --clobber
          candidate="aviation-base-manifest.js.candidate.${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}"
          cp dist/base/aviation-base-manifest.js "$candidate"
          gh release upload aviation-base-data "$candidate" --clobber
          release_id=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/aviation-base-data" --jq .id)
          assets=$(gh api "repos/${GITHUB_REPOSITORY}/releases/${release_id}/assets" --paginate)
          candidate_id=$(jq -r --arg name "$candidate" 'map(select(.name == $name)) | first | .id // empty' <<<"$assets")
          old_id=$(jq -r 'map(select(.name == "aviation-base-manifest.js")) | first | .id // empty' <<<"$assets")
          test -n "$candidate_id"
          if test -n "$old_id"; then
            gh api -X PATCH "repos/${GITHUB_REPOSITORY}/releases/assets/${old_id}" \
              -f name="aviation-base-manifest.js.previous.${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}" >/dev/null
          fi
          gh api -X PATCH "repos/${GITHUB_REPOSITORY}/releases/assets/${candidate_id}" \
            -f name='aviation-base-manifest.js' >/dev/null
          if test -n "$old_id"; then gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/${old_id}"; fi
