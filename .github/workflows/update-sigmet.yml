name: Update AWC SIGMET snapshot

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-awc-sigmet
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          package-manager-cache: false
      - name: Validate builders
        run: node --test tests/tfr-data.test.mjs tests/sigmet-data.test.mjs
      - name: Restore last published snapshots
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p previous dist
          cp data/*.js dist/
          gh release download aviation-live-data --pattern 'sigmet.js' --dir previous --clobber || true
          if test -f previous/sigmet.js; then
            cp previous/sigmet.js dist/sigmet.js
          else
            cp data/sigmet.js previous/sigmet.js
          fi
      - name: Build and validate current AWC snapshot
        run: |
          node scripts/build-sigmet.mjs dist/sigmet.js
          node --check dist/sigmet.js
          node scripts/validate-aviation-assets.mjs dist
      - name: Replace fixed release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if cmp -s previous/sigmet.js dist/sigmet.js; then
            echo "AWC SIGMET snapshot is unchanged."
            exit 0
          fi
          if ! gh release view aviation-live-data >/dev/null 2>&1; then
            gh release create aviation-live-data \
              --title "Live aviation data" \
              --notes "Automatically replaced FAA and AWC snapshots for 3DWeather." \
              --prerelease
          fi
          gh release upload aviation-live-data dist/sigmet.js --clobber
